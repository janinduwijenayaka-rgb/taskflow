<!DOCTYPE html>
<html lang="si">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>

  <body>

    <div class="app-wrapper">
      <div class="app">

        <!-- HEADER -->
        <header class="header">
          <div class="header-left">
            <h1 class="app-title">✓ TaskFlow</h1>
            <p class="header-date" id="date-display"></p>
          </div>
          <p class="progress-label" id="progress-label">0% complete</p>
        </header>

        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="global-progress"></div>
        </div>

        <!-- STATS -->
        <div class="stats-grid">
          <div class="stat-card">
            <p class="stat-label">Total tasks</p>
            <p class="stat-value" id="s-total">0</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Done</p>
            <p class="stat-value green" id="s-done">0</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">In progress</p>
            <p class="stat-value amber" id="s-prog">0</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Overdue</p>
            <p class="stat-value red" id="s-over">0</p>
          </div>
        </div>

        <!-- ADD TASK FORM -->
        <div class="add-form">
          <input
            type="text"
            id="task-input"
            class="form-input"
            placeholder="Task name..."
            onkeydown="handleEnter(event)"
          >
          <select id="priority-select" class="form-select">
            <option value="medium">🟡 Medium</option>
            <option value="high">🔴 High</option>
            <option value="low">🟢 Low</option>
          </select>
          <select id="cat-select" class="form-select">
            <option value="General">General</option>
            <option value="Assignment">Assignment</option>
            <option value="Project">Project</option>
            <option value="Exam">Exam</option>
            <option value="Personal">Personal</option>
          </select>
          <input type="date" id="due-input" class="form-input date-input">
          <button class="btn-add" onclick="addTask()">+ Add task</button>
        </div>

        <!-- KANBAN BOARD -->
        <div class="kanban-board">

          <div class="kanban-col">
            <div class="col-header">
              <span class="col-title">○ To do</span>
              <span class="col-count" id="count-todo">0</span>
            </div>
            <div class="col-body" id="col-todo"></div>
          </div>

          <div class="kanban-col">
            <div class="col-header">
              <span class="col-title">◑ In progress</span>
              <span class="col-count" id="count-prog">0</span>
            </div>
            <div class="col-body" id="col-prog"></div>
          </div>

          <div class="kanban-col">
            <div class="col-header">
              <span class="col-title">● Done</span>
              <span class="col-count" id="count-done">0</span>
            </div>
            <div class="col-body" id="col-done"></div>
          </div>

        </div>

      </div>
    </div>

    <!--
    ============================================================
      FIREBASE SDK - script.js ට ABOVE ට දාන්න ඕනෙ!
      Firebase load වෙලා ඉවර වෙලා script.js run වෙන්න.

      Version 9 compat mode use කරනවා (existing code change නැහැ).
    ============================================================
    -->

    <!-- Firebase App (required - always first) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

    <!-- Firestore (database) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Your app script (Firebase load වෙලා LAST ට) -->
    <script src="script.js"></script>

  </body>

</html>
